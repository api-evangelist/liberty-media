aid: liberty-media
name: Liberty Media
description: >-
  Liberty Media Corporation is a media and entertainment holding company
  headquartered in Englewood, Colorado, owning interests in a portfolio of
  assets across media, entertainment, and sports. Its primary holding is the
  Formula One Group, which encompasses Formula 1 racing operations and
  MotoGP motorcycle racing, alongside investments in companies such as
  Liberty Broadband, QVC Group, Atlanta Braves Holdings, and Liberty Live
  Holdings.
